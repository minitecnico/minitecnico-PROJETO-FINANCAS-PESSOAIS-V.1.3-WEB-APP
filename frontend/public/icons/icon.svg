<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo edge-to-edge -->
  <rect width="512" height="512" fill="#c4f542"/>

  <!-- Carteira no centro, grande, preta sólida -->
  <g transform="translate(256, 256)" fill="#161610">
    <!-- Corpo da carteira (290x200 centralizado) -->
    <rect x="-145" y="-100" width="290" height="200" rx="28" ry="28"/>
    <!-- Faixa horizontal interna (detalhe) -->
    <rect x="-145" y="-22" width="290" height="44" fill="#c4f542"/>
    <!-- "Botão" arredondado da carteira -->
    <circle cx="105" cy="0" r="22" fill="#c4f542"/>
    <circle cx="105" cy="0" r="11" fill="#161610"/>
  </g>
</svg>
